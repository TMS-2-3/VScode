<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Editor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3ea;
        --panel: #fbfaf3;
        --panel-2: #f3efe2;
        --ink: #252b23;
        --muted: #66705f;
        --line: #c9d0be;
        --accent: #2f7d5f;
        --accent-2: #c9893d;
        --danger: #b74c42;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .app {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-columns: 292px minmax(420px, 1fr) 340px;
        overflow: hidden;
      }

      .side,
      .export {
        height: 100vh;
        min-height: 0;
        padding: 16px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .export {
        border-right: 0;
        border-left: 1px solid var(--line);
      }

      .stage {
        min-width: 0;
        min-height: 0;
        height: 100vh;
        padding: 16px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        letter-spacing: 0;
      }

      h2 {
        margin: 18px 0 10px;
        font-size: 14px;
        letter-spacing: 0;
      }

      label {
        display: block;
        margin: 9px 0 5px;
        font-size: 12px;
        color: var(--muted);
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 7px 8px;
      }

      textarea {
        min-height: 360px;
        resize: vertical;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .button-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .button-row button,
      .wide-button {
        min-height: 34px;
        padding: 7px 10px;
      }

      .wide-button {
        width: 100%;
        margin-top: 8px;
      }

      .primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .warning {
        border-color: #dfbd86;
        background: #fff7e9;
      }

      .danger {
        border-color: #e5b5af;
        background: #fff1ef;
        color: var(--danger);
      }

      .layer-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .layer-tabs button {
        min-height: 34px;
      }

      .layer-tabs .active,
      .tool-row .active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .tool-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }

      .view-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .view-row .active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .rotate-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .tile-pick {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        padding: 0;
        overflow: hidden;
        background: #d8decf;
      }

      .tile-pick.active {
        outline: 3px solid var(--accent-2);
        outline-offset: 1px;
      }

      .tile-pick img {
        position: absolute;
        object-fit: cover;
        pointer-events: none;
      }

      .tile-pick span {
        position: absolute;
        left: 2px;
        right: 2px;
        bottom: 2px;
        padding: 1px 2px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.82);
        color: #1f251e;
        font-size: 10px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .map-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
        flex: 0 0 auto;
      }

      .map-header h1 {
        margin: 0;
      }

      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 13px;
      }

      .editor-mode {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .map-toolbar {
        display: grid;
        justify-items: end;
        gap: 7px;
        flex: 0 0 auto;
      }

      .zoom-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .map-control-row {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }

      .history-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .margin-tile-editor {
        display: grid;
        gap: 4px;
        justify-items: center;
      }

      .margin-tile-editor span {
        color: var(--muted);
        font-size: 12px;
      }

      .margin-tile-cell {
        position: relative;
        box-sizing: border-box;
        width: 42px;
        min-width: 42px;
        height: 42px;
        min-height: 42px;
        padding: 0;
        overflow: hidden;
        background: #d8decf;
      }

      .margin-tile-cell img {
        position: absolute;
        display: block;
        object-fit: cover;
        pointer-events: none;
      }

      .margin-tile-cell.empty::after {
        content: "-";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-weight: 800;
      }

      .history-controls button,
      .zoom-controls button {
        min-width: 34px;
        min-height: 30px;
        padding: 4px 8px;
      }

      .zoom-controls input {
        width: 120px;
        min-height: 30px;
        padding: 0;
      }

      .zoom-value {
        min-width: 46px;
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .surface-viewport {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        border: 1px solid var(--line);
        background: #dde7d3;
        overscroll-behavior: contain;
      }

      .surface-scale {
        position: relative;
        min-width: 100%;
        min-height: 100%;
      }

      .surface-wrap {
        position: absolute;
        left: 0;
        top: 0;
        width: max-content;
        padding: 18px;
        background: var(--panel-2);
        transform-origin: left top;
      }

      .map-surface {
        position: relative;
        background: #8bbd62;
        box-shadow: 0 0 0 1px rgba(37, 43, 35, 0.4);
        overflow: visible;
        cursor: crosshair;
      }

      .map-image {
        position: absolute;
        object-fit: cover;
        pointer-events: none;
        image-rendering: auto;
      }

      .map-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 20000;
        background-image:
          linear-gradient(to right, rgba(20, 24, 18, 0.2) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(20, 24, 18, 0.2) 1px, transparent 1px);
      }

      .coord-label {
        position: absolute;
        left: 4px;
        top: 3px;
        min-width: 16px;
        padding: 1px 3px 2px;
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.46);
        color: #fff;
        font-weight: 800;
        line-height: 1;
        text-align: left;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.34);
        user-select: none;
      }

      .cursor-cell {
        position: absolute;
        box-sizing: border-box;
        pointer-events: none;
        border: 2px solid #f7e27b;
        box-shadow: inset 0 0 0 1px rgba(20, 24, 18, 0.45);
        z-index: 30000;
      }

      .range-cell {
        position: absolute;
        box-sizing: border-box;
        pointer-events: none;
        border: 2px solid #f7e27b;
        background: rgba(247, 226, 123, 0.18);
        box-shadow: inset 0 0 0 1px rgba(20, 24, 18, 0.45);
        z-index: 29000;
      }

      .duplicate-cell {
        position: absolute;
        box-sizing: border-box;
        pointer-events: none;
        border: 2px dashed #46bde8;
        background: rgba(70, 189, 232, 0.14);
        box-shadow: inset 0 0 0 1px rgba(20, 24, 18, 0.42);
        z-index: 29500;
      }

      .selected-info {
        display: grid;
        gap: 6px;
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
      }

      .selected-info strong {
        color: var(--accent);
      }

      .small-note {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 1080px) {
        .app {
          grid-template-columns: 280px 1fr;
        }

        .export {
          grid-column: 1 / -1;
          height: 280px;
          min-height: 0;
          border-left: 0;
          border-top: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <h1>Map Editor</h1>

        <label for="map-select">マップ</label>
        <select id="map-select"></select>

        <div class="row">
          <div>
            <label for="map-id">ID</label>
            <input id="map-id" value="smallMap01" />
          </div>
          <div>
            <label for="map-name-input">名前</label>
            <input id="map-name-input" value="小マップ01" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="map-width">幅</label>
            <input id="map-width" type="number" min="1" max="80" value="8" />
          </div>
          <div>
            <label for="map-height">高さ</label>
            <input id="map-height" type="number" min="1" max="80" value="15" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="tile-size">タイル</label>
            <input id="tile-size" type="number" min="16" max="96" value="48" />
          </div>
          <div>
            <label for="default-tile">標準</label>
            <select id="default-tile"></select>
          </div>
        </div>

        <div class="button-row">
          <button id="new-map-button" class="primary">新規作成</button>
          <button id="resize-button">反映</button>
        </div>
        <p class="small-note">`新規作成` はブラウザ上の編集用マップを作ります。`maps.js` へは自動保存されません。</p>

        <h2>ツール</h2>
        <div class="tool-row">
          <button data-tool="paint" class="active">配置</button>
          <button data-tool="erase">消去</button>
          <button data-tool="fill">塗潰</button>
          <button data-tool="range">範囲</button>
          <button data-tool="duplicate">複製</button>
        </div>

        <h2>表示</h2>
        <div class="view-row">
          <button id="coord-label-button" class="active">座標番号</button>
        </div>

        <h2>向き</h2>
        <div class="rotate-row">
          <button id="rotate-left-button">左回転</button>
          <button id="rotate-reset-button">0度</button>
          <button id="rotate-right-button">右回転</button>
        </div>

        <h2>レイヤー</h2>
        <div id="layer-tabs" class="layer-tabs"></div>

        <h2>選択</h2>
        <div id="selected-info" class="selected-info"></div>

        <h2>タイル</h2>
        <div id="palette" class="palette"></div>
      </aside>

      <main class="stage">
        <div class="map-header">
          <div>
            <h1 id="map-title">小マップ01</h1>
            <div id="status" class="status"></div>
          </div>
          <div class="map-toolbar">
            <div class="status" id="map-size-label"></div>
            <div class="map-control-row">
              <div class="margin-tile-editor">
                <span>余白タイル</span>
                <button id="margin-tile-cell" class="margin-tile-cell" type="button"></button>
              </div>
              <div class="history-controls">
                <button id="undo-button" type="button" title="一つ戻る" aria-label="一つ戻る">戻る</button>
                <button id="redo-button" type="button" title="一つ進む" aria-label="一つ進む">進む</button>
              </div>
              <div class="zoom-controls">
                <button id="zoom-out-button" type="button">-</button>
                <input id="zoom-range" type="range" min="50" max="200" step="10" value="100" />
                <button id="zoom-in-button" type="button">+</button>
                <button id="zoom-reset-button" type="button">100%</button>
                <span id="zoom-value" class="zoom-value">100%</span>
              </div>
            </div>
          </div>
        </div>
        <div id="surface-viewport" class="surface-viewport">
          <div id="surface-scale" class="surface-scale">
            <div id="surface-wrap" class="surface-wrap">
              <div id="map-surface" class="map-surface">
                <div id="cursor-cell" class="cursor-cell hidden"></div>
                <div id="range-cell" class="range-cell hidden"></div>
                <div id="duplicate-cell" class="duplicate-cell hidden"></div>
                <div id="map-grid" class="map-grid"></div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <aside class="export">
        <h1>Export</h1>
        <button id="save-record-button" class="wide-button primary">作業記録JSON保存</button>
        <button id="load-record-button" class="wide-button">作業記録JSON読込</button>
        <button id="save-local-button" class="wide-button hidden">一時保存</button>
        <button id="load-local-button" class="wide-button hidden">一時読込</button>
        <button id="reload-map-button" class="wide-button hidden">現在マップを戻す</button>
        <button id="reload-page-button" class="wide-button">maps再読込</button>
        <button id="delete-map-button" class="wide-button danger hidden">マップ削除</button>
        <button id="copy-button" class="wide-button">コピー</button>
        <button id="download-button" class="wide-button">JS書き出し</button>
        <button id="clear-layer-button" class="wide-button danger">レイヤー消去</button>

        <h2>マップ定義</h2>
        <textarea id="export-text" spellcheck="false"></textarea>
        <p class="small-note">安全に同期する場合は、`JS書き出し` で定義を書き出し、`maps.js` に反映したあとで `maps再読込` を押してください。</p>
      </aside>
    </div>

    <script src="tile.js"></script>
    <script src="maps.js"></script>
    <script>
      const defs = window.HEALER_TILE_DEFS || {};
      const sourceMaps = window.HEALER_TILE_MAPS || {};
      const layerConfigs = [
        { id: "ground", name: "地面" },
        { id: "terrain", name: "地形" },
        { id: "object", name: "配置物" },
        { id: "event", name: "イベント" },
      ];

      const state = {
        map: null,
        activeLayer: "ground",
        selectedTile: "grass",
        selectedRotation: 0,
        tool: "paint",
        showCoordLabels: true,
        mapZoom: 1,
        isPointerDown: false,
        lastPaintKey: "",
        rangeStartCell: null,
        rangeCurrentCell: null,
        duplicateStartCell: null,
        duplicateCurrentCell: null,
        duplicateSelection: null,
        duplicateHoverCell: null,
        undoStack: [],
        redoStack: [],
        pendingHistorySnapshot: null,
        dragClientX: null,
        dragClientY: null,
        autoScrollFrameId: 0,
      };

      const MAP_ZOOM_MIN = 0.5;
      const MAP_ZOOM_MAX = 2;
      const MAP_ZOOM_STEP = 0.1;
      const HISTORY_LIMIT = 20;
      const DRAG_SCROLL_EDGE_SIZE = 56;
      const DRAG_SCROLL_MAX_SPEED = 24;

      const mapSelect = document.getElementById("map-select");
      const mapIdInput = document.getElementById("map-id");
      const mapNameInput = document.getElementById("map-name-input");
      const mapWidthInput = document.getElementById("map-width");
      const mapHeightInput = document.getElementById("map-height");
      const tileSizeInput = document.getElementById("tile-size");
      const defaultTileSelect = document.getElementById("default-tile");
      const layerTabs = document.getElementById("layer-tabs");
      const palette = document.getElementById("palette");
      const selectedInfo = document.getElementById("selected-info");
      const surfaceViewport = document.getElementById("surface-viewport");
      const surfaceScale = document.getElementById("surface-scale");
      const surfaceWrap = document.getElementById("surface-wrap");
      const surface = document.getElementById("map-surface");
      const grid = document.getElementById("map-grid");
      const cursorCell = document.getElementById("cursor-cell");
      const rangeCell = document.getElementById("range-cell");
      const duplicateCell = document.getElementById("duplicate-cell");
      const coordLabelButton = document.getElementById("coord-label-button");
      const marginTileCell = document.getElementById("margin-tile-cell");
      const undoButton = document.getElementById("undo-button");
      const redoButton = document.getElementById("redo-button");
      const zoomOutButton = document.getElementById("zoom-out-button");
      const zoomInButton = document.getElementById("zoom-in-button");
      const zoomResetButton = document.getElementById("zoom-reset-button");
      const zoomRange = document.getElementById("zoom-range");
      const zoomValue = document.getElementById("zoom-value");
      const statusLine = document.getElementById("status");
      const mapTitle = document.getElementById("map-title");
      const mapSizeLabel = document.getElementById("map-size-label");
      const exportText = document.getElementById("export-text");
      const draftFileInput = document.createElement("input");
      draftFileInput.type = "file";
      draftFileInput.accept = ".json,application/json";
      const editorMode = document.createElement("div");
      editorMode.className = "editor-mode";
      statusLine.insertAdjacentElement("afterend", editorMode);

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function normalizeRotation(value) {
        const rotation = Number(value) || 0;
        const snapped = Math.round(rotation / 90) * 90;
        return ((snapped % 360) + 360) % 360;
      }

      function isTileEntryObject(value) {
        return !!value && typeof value === "object" && !Array.isArray(value);
      }

      function normalizeTileEntry(value, fill) {
        if (value == null) return fill;
        if (!isTileEntryObject(value)) return value;
        const tileId = value.tileId || value.id || null;
        if (!tileId) return fill;
        const rotation = normalizeRotation(value.rotate);
        if (!rotation) return tileId;
        return { tileId, rotate: rotation };
      }

      function getTileIdFromEntry(value) {
        if (value == null) return null;
        return isTileEntryObject(value) ? value.tileId || value.id || null : value;
      }

      function getTileRotationFromEntry(value) {
        return isTileEntryObject(value) ? normalizeRotation(value.rotate) : 0;
      }

      function createTileEntry(tileId, rotation = state.selectedRotation) {
        if (!tileId) return null;
        const normalizedRotation = normalizeRotation(rotation);
        if (!normalizedRotation) return tileId;
        return { tileId, rotate: normalizedRotation };
      }

      function formatTileSource(tile) {
        if (!tile) return "null";
        if (!isTileEntryObject(tile)) return `"${tile}"`;
        const tileId = tile.tileId || tile.id;
        const rotation = normalizeRotation(tile.rotate);
        if (!rotation) return `"${tileId}"`;
        return `{ tileId: "${tileId}", rotate: ${rotation} }`;
      }

      function createSerializableTileEntry(tile) {
        if (!tile) return null;
        if (!isTileEntryObject(tile)) return tile;
        const tileId = tile.tileId || tile.id || null;
        if (!tileId) return null;
        const rotation = normalizeRotation(tile.rotate);
        return rotation ? { tileId, rotate: rotation } : tileId;
      }

      function tileEntriesEqual(a, b) {
        return JSON.stringify(createSerializableTileEntry(a)) === JSON.stringify(createSerializableTileEntry(b));
      }

      function copyTileEntry(tile) {
        return isTileEntryObject(tile) ? clone(tile) : tile;
      }

      function clampNumber(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function normalizeZoom(value) {
        const zoom = Number(value);
        const safeZoom = Number.isFinite(zoom) ? zoom : 1;
        return clampNumber(Math.round(safeZoom / MAP_ZOOM_STEP) * MAP_ZOOM_STEP, MAP_ZOOM_MIN, MAP_ZOOM_MAX);
      }

      function getViewportCenterForZoom() {
        const zoom = state.mapZoom || 1;
        return {
          x: (surfaceViewport.scrollLeft + surfaceViewport.clientWidth / 2) / zoom,
          y: (surfaceViewport.scrollTop + surfaceViewport.clientHeight / 2) / zoom,
        };
      }

      function restoreViewportCenterForZoom(center) {
        if (!center) return;
        const zoom = state.mapZoom || 1;
        surfaceViewport.scrollLeft = Math.max(0, center.x * zoom - surfaceViewport.clientWidth / 2);
        surfaceViewport.scrollTop = Math.max(0, center.y * zoom - surfaceViewport.clientHeight / 2);
      }

      function syncZoomControls() {
        const percent = Math.round((state.mapZoom || 1) * 100);
        zoomRange.value = String(percent);
        zoomValue.textContent = `${percent}%`;
        zoomResetButton.textContent = "100%";
        if (state.map) {
          const tileSize = state.map.tileSize;
          mapSizeLabel.textContent = `${state.map.width * tileSize} x ${state.map.height * tileSize}px / ${percent}%`;
        }
      }

      function applyMapZoom(options = {}) {
        const zoom = state.mapZoom || 1;
        surfaceWrap.style.transform = `scale(${zoom})`;
        const wrapWidth = Math.max(1, surfaceWrap.offsetWidth || 1);
        const wrapHeight = Math.max(1, surfaceWrap.offsetHeight || 1);
        surfaceScale.style.width = `${Math.ceil(wrapWidth * zoom)}px`;
        surfaceScale.style.height = `${Math.ceil(wrapHeight * zoom)}px`;
        syncZoomControls();
        if (options.center) {
          restoreViewportCenterForZoom(options.center);
        }
      }

      function setMapZoom(value, options = {}) {
        const nextZoom = normalizeZoom(value);
        if (Math.abs(nextZoom - (state.mapZoom || 1)) < 0.001) {
          applyMapZoom();
          return;
        }
        const center = options.preserveCenter === false ? null : getViewportCenterForZoom();
        state.mapZoom = nextZoom;
        applyMapZoom({ center });
        setStatus(`表示倍率を ${Math.round(nextZoom * 100)}% にしました。`);
      }

      function getColumnLabel(col) {
        let index = Math.max(0, Math.floor(Number(col) || 0));
        let label = "";
        do {
          label = String.fromCharCode(65 + (index % 26)) + label;
          index = Math.floor(index / 26) - 1;
        } while (index >= 0);
        return label;
      }

      function getTileCoordLabel(col, row) {
        return `${getColumnLabel(col)}${Math.max(0, Math.floor(Number(row) || 0)) + 1}`;
      }

      function sanitizeId(value) {
        return String(value || "map01").trim().replace(/[^A-Za-z0-9_]/g, "_") || "map01";
      }

      function makeBlankLayer(id, name, width, height, fill) {
        return {
          id,
          name,
          tiles: Array.from({ length: width * height }, () => fill),
        };
      }

      function normalizeLayer(layer, width, height, fill) {
        const tiles = Array.isArray(layer.tiles)
          ? layer.tiles.slice(0, width * height).map((tile) => normalizeTileEntry(tile, fill))
          : [];
        while (tiles.length < width * height) tiles.push(fill);
        return { id: layer.id, name: layer.name || layer.id, tiles };
      }

      function resizeLayerPreservingPositions(layer, oldWidth, oldHeight, width, height, fill) {
        const oldTiles = Array.isArray(layer.tiles) ? layer.tiles : [];
        const tiles = Array.from({ length: width * height }, () => fill);
        const copyWidth = Math.min(Math.max(0, oldWidth), width);
        const copyHeight = Math.min(Math.max(0, oldHeight), height);
        for (let y = 0; y < copyHeight; y += 1) {
          for (let x = 0; x < copyWidth; x += 1) {
            tiles[y * width + x] = normalizeTileEntry(oldTiles[y * oldWidth + x], fill);
          }
        }
        return { id: layer.id, name: layer.name || layer.id, tiles };
      }

      function getMarginFillForLayer(layerId, defaultTile = state.map && state.map.defaultTile) {
        return layerId === "ground" ? defaultTile || "grass" : null;
      }

      function normalizeMarginTiles(map, defaultTile) {
        const result = {};
        const rawMarginTiles = map && map.marginTiles;
        const hasLayeredMargin = rawMarginTiles && typeof rawMarginTiles === "object" && !Array.isArray(rawMarginTiles);
        const hasLegacyMargin = Object.prototype.hasOwnProperty.call(map || {}, "marginTile");
        const legacyMarginTile = hasLegacyMargin ? map.marginTile : defaultTile;

        layerConfigs.forEach((config) => {
          const fill = getMarginFillForLayer(config.id, defaultTile);
          if (hasLayeredMargin) {
            const hasLayerValue = Object.prototype.hasOwnProperty.call(rawMarginTiles, config.id);
            result[config.id] = normalizeTileEntry(hasLayerValue ? rawMarginTiles[config.id] : fill, fill);
          } else if (config.id === "ground") {
            result[config.id] = legacyMarginTile == null ? null : normalizeTileEntry(legacyMarginTile, fill);
          } else {
            result[config.id] = null;
          }
        });

        return result;
      }

      function getMarginTiles() {
        if (!state.map.marginTiles) {
          state.map.marginTiles = normalizeMarginTiles(state.map, state.map.defaultTile);
        }
        return state.map.marginTiles;
      }

      function normalizeMap(map) {
        const width = Math.max(1, Number(map.width) || 8);
        const height = Math.max(1, Number(map.height) || 15);
        const defaultTile = defs[map.defaultTile] ? map.defaultTile : "grass";
        const sourceLayers = Array.isArray(map.layers) ? map.layers : [];
        const layers = layerConfigs.map((config) => {
          const existing = sourceLayers.find((layer) => layer.id === config.id);
          const fill = config.id === "ground" ? defaultTile : null;
          return existing
            ? normalizeLayer({ ...existing, name: existing.name || config.name }, width, height, fill)
            : makeBlankLayer(config.id, config.name, width, height, fill);
        });
        return {
          id: sanitizeId(map.id || "smallMap01"),
          name: map.name || "小マップ01",
          tileSize: Number(map.tileSize) || 48,
          width,
          height,
          defaultTile,
          marginTiles: normalizeMarginTiles(map, defaultTile),
          layers,
          events: Array.isArray(map.events) ? clone(map.events) : [],
        };
      }

      function createNewMap() {
        return normalizeMap({
          id: sanitizeId(mapIdInput.value || "smallMap01"),
          name: mapNameInput.value || "小マップ01",
          tileSize: Number(tileSizeInput.value) || 48,
          width: Number(mapWidthInput.value) || 8,
          height: Number(mapHeightInput.value) || 15,
          defaultTile: defaultTileSelect.value || "grass",
          marginTiles: {
            ground: defaultTileSelect.value || "grass",
            terrain: null,
            object: null,
            event: null,
          },
          layers: [],
          events: [],
        });
      }

      function getLayer(id = state.activeLayer) {
        return state.map.layers.find((layer) => layer.id === id);
      }

      function getTileDef(tileId) {
        return tileId ? defs[tileId] : null;
      }

      function resolveEditorImagePath(src) {
        if (!src) return "";
        return src.startsWith("map/") ? `../${src}` : src;
      }

      function hasTag(def, tag) {
        return def && Array.isArray(def.tags) && def.tags.includes(tag);
      }

      function tileFitsLayer(tileId, layerId) {
        const def = getTileDef(tileId);
        if (!def) return false;
        if (layerId === "ground") return hasTag(def, "ground") && !hasTag(def, "object") && !hasTag(def, "terrainBlock");
        if (layerId === "terrain") return hasTag(def, "terrainBlock") || (hasTag(def, "block") && !hasTag(def, "object") && !hasTag(def, "event"));
        if (layerId === "object") return hasTag(def, "object");
        if (layerId === "event") return hasTag(def, "event") || tileId === "door";
        return true;
      }

      function getPaletteTiles() {
        return Object.keys(defs)
          .filter((tileId) => tileFitsLayer(tileId, state.activeLayer))
          .sort((a, b) => {
            const an = defs[a].name || a;
            const bn = defs[b].name || b;
            return an.localeCompare(bn, "ja");
          });
      }

      function getCellFromClientPoint(clientX, clientY) {
        const rect = surface.getBoundingClientRect();
        const tileSize = state.map.tileSize;
        const zoom = state.mapZoom || 1;
        const x = Math.floor(((clientX - rect.left) / zoom) / tileSize);
        const y = Math.floor(((clientY - rect.top) / zoom) / tileSize);
        if (x < 0 || y < 0 || x >= state.map.width || y >= state.map.height) return null;
        return { x, y, index: y * state.map.width + x };
      }

      function getCellFromEvent(event) {
        return getCellFromClientPoint(event.clientX, event.clientY);
      }

      function updateCursorForCell(cell) {
        if (cell) {
          cursorCell.classList.remove("hidden");
          cursorCell.style.left = `${cell.x * state.map.tileSize}px`;
          cursorCell.style.top = `${cell.y * state.map.tileSize}px`;
        } else {
          cursorCell.classList.add("hidden");
        }
      }

      function updateSurfacePointerFromClient(clientX, clientY) {
        const cell = getCellFromClientPoint(clientX, clientY);
        updateCursorForCell(cell);
        if (state.tool === "duplicate") {
          if (state.isPointerDown && state.duplicateStartCell && !state.duplicateSelection) {
            if (cell) state.duplicateCurrentCell = cell;
            renderRangePreview(state.duplicateStartCell, state.duplicateCurrentCell);
          } else {
            state.duplicateHoverCell = cell;
            renderDuplicateFrame(cell);
          }
          return;
        }
        if (state.isPointerDown && state.tool === "range") {
          if (cell) state.rangeCurrentCell = cell;
          renderRangePreview(state.rangeStartCell, state.rangeCurrentCell);
          return;
        }
        if (state.isPointerDown && state.tool !== "fill") paintCell(cell);
      }

      function canAutoScrollDrag() {
        if (!state.isPointerDown || !state.map) return false;
        if (state.tool === "fill") return false;
        return !(state.tool === "duplicate" && state.duplicateSelection);
      }

      function getDragScrollSpeed(edgeDistance) {
        const proximity = clampNumber((DRAG_SCROLL_EDGE_SIZE - edgeDistance) / DRAG_SCROLL_EDGE_SIZE, 0, 1);
        if (proximity <= 0) return 0;
        return Math.ceil(2 + (DRAG_SCROLL_MAX_SPEED - 2) * proximity * proximity);
      }

      function getDragScrollDelta(clientX, clientY) {
        const rect = surfaceViewport.getBoundingClientRect();
        const maxScrollLeft = Math.max(0, surfaceViewport.scrollWidth - surfaceViewport.clientWidth);
        const maxScrollTop = Math.max(0, surfaceViewport.scrollHeight - surfaceViewport.clientHeight);
        let dx = 0;
        let dy = 0;

        if (maxScrollLeft > 0) {
          const leftDistance = clientX - rect.left;
          const rightDistance = rect.right - clientX;
          if (leftDistance < DRAG_SCROLL_EDGE_SIZE && surfaceViewport.scrollLeft > 0) {
            dx = -getDragScrollSpeed(leftDistance);
          } else if (rightDistance < DRAG_SCROLL_EDGE_SIZE && surfaceViewport.scrollLeft < maxScrollLeft) {
            dx = getDragScrollSpeed(rightDistance);
          }
        }

        if (maxScrollTop > 0) {
          const topDistance = clientY - rect.top;
          const bottomDistance = rect.bottom - clientY;
          if (topDistance < DRAG_SCROLL_EDGE_SIZE && surfaceViewport.scrollTop > 0) {
            dy = -getDragScrollSpeed(topDistance);
          } else if (bottomDistance < DRAG_SCROLL_EDGE_SIZE && surfaceViewport.scrollTop < maxScrollTop) {
            dy = getDragScrollSpeed(bottomDistance);
          }
        }

        return { dx, dy };
      }

      function rememberDragPointer(event) {
        state.dragClientX = event.clientX;
        state.dragClientY = event.clientY;
      }

      function scheduleDragAutoScroll() {
        if (state.autoScrollFrameId) return;
        state.autoScrollFrameId = window.requestAnimationFrame(runDragAutoScroll);
      }

      function startDragAutoScroll(event) {
        rememberDragPointer(event);
        if (canAutoScrollDrag()) {
          scheduleDragAutoScroll();
        }
      }

      function stopDragAutoScroll() {
        if (state.autoScrollFrameId) {
          window.cancelAnimationFrame(state.autoScrollFrameId);
        }
        state.autoScrollFrameId = 0;
        state.dragClientX = null;
        state.dragClientY = null;
      }

      function runDragAutoScroll() {
        state.autoScrollFrameId = 0;
        if (!canAutoScrollDrag() || state.dragClientX === null || state.dragClientY === null) return;

        const { dx, dy } = getDragScrollDelta(state.dragClientX, state.dragClientY);
        if (dx || dy) {
          const beforeLeft = surfaceViewport.scrollLeft;
          const beforeTop = surfaceViewport.scrollTop;
          surfaceViewport.scrollLeft += dx;
          surfaceViewport.scrollTop += dy;
          if (surfaceViewport.scrollLeft !== beforeLeft || surfaceViewport.scrollTop !== beforeTop) {
            updateSurfacePointerFromClient(state.dragClientX, state.dragClientY);
          }
          scheduleDragAutoScroll();
        }
      }

      function getRectFromCells(startCell, endCell) {
        if (!startCell || !endCell) return null;
        const minX = Math.min(startCell.x, endCell.x);
        const maxX = Math.max(startCell.x, endCell.x);
        const minY = Math.min(startCell.y, endCell.y);
        const maxY = Math.max(startCell.y, endCell.y);
        return {
          minX,
          maxX,
          minY,
          maxY,
          width: maxX - minX + 1,
          height: maxY - minY + 1,
        };
      }

      function renderRangePreview(startCell, endCell) {
        const rect = getRectFromCells(startCell, endCell);
        if (!rect) {
          rangeCell.classList.add("hidden");
          return;
        }

        const tileSize = state.map.tileSize;
        rangeCell.classList.remove("hidden");
        rangeCell.style.left = `${rect.minX * tileSize}px`;
        rangeCell.style.top = `${rect.minY * tileSize}px`;
        rangeCell.style.width = `${rect.width * tileSize}px`;
        rangeCell.style.height = `${rect.height * tileSize}px`;
      }

      function clearRangePreview() {
        state.rangeStartCell = null;
        state.rangeCurrentCell = null;
        rangeCell.classList.add("hidden");
      }

      function clearDuplicateSelection() {
        state.duplicateStartCell = null;
        state.duplicateCurrentCell = null;
        state.duplicateSelection = null;
        state.duplicateHoverCell = null;
        duplicateCell.classList.add("hidden");
      }

      function renderDuplicateFrame(cell) {
        const selection = state.duplicateSelection;
        if (!selection || !cell) {
          duplicateCell.classList.add("hidden");
          return;
        }
        const tileSize = state.map.tileSize;
        duplicateCell.classList.remove("hidden");
        duplicateCell.style.left = `${cell.x * tileSize}px`;
        duplicateCell.style.top = `${cell.y * tileSize}px`;
        duplicateCell.style.width = `${selection.width * tileSize}px`;
        duplicateCell.style.height = `${selection.height * tileSize}px`;
      }

      function captureDuplicateSelection(startCell, endCell) {
        const rect = getRectFromCells(startCell, endCell);
        if (!rect) return false;
        state.duplicateSelection = {
          width: rect.width,
          height: rect.height,
          layers: state.map.layers.map((layer) => {
            const tiles = [];
            for (let y = rect.minY; y <= rect.maxY; y += 1) {
              for (let x = rect.minX; x <= rect.maxX; x += 1) {
                tiles.push(copyTileEntry(layer.tiles[y * state.map.width + x]));
              }
            }
            return { id: layer.id, tiles };
          }),
        };
        state.duplicateStartCell = null;
        state.duplicateCurrentCell = null;
        clearRangePreview();
        setStatus(`${rect.width} x ${rect.height} の範囲を複製選択しました。左クリックで貼付、右クリックで連続貼付できます。`);
        return true;
      }

      function pasteDuplicateSelection(cell, keepSelection) {
        const selection = state.duplicateSelection;
        if (!selection || !cell) return false;
        const snapshot = createHistorySnapshot();
        let changed = false;
        selection.layers.forEach((sourceLayer) => {
          const layer = state.map.layers.find((entry) => entry.id === sourceLayer.id);
          if (!layer) return;
          for (let y = 0; y < selection.height; y += 1) {
            const destY = cell.y + y;
            if (destY < 0 || destY >= state.map.height) continue;
            for (let x = 0; x < selection.width; x += 1) {
              const destX = cell.x + x;
              if (destX < 0 || destX >= state.map.width) continue;
              const destIndex = destY * state.map.width + destX;
              const nextTile = sourceLayer.tiles[y * selection.width + x];
              if (!tileEntriesEqual(layer.tiles[destIndex], nextTile)) {
                layer.tiles[destIndex] = copyTileEntry(nextTile);
                changed = true;
              }
            }
          }
        });
        if (changed) {
          renderSurface();
          commitHistoryEntry(snapshot);
        }
        if (keepSelection) {
          state.duplicateHoverCell = cell;
          renderDuplicateFrame(cell);
          setStatus(`${selection.width} x ${selection.height} の範囲を複製しました。`);
        } else {
          clearDuplicateSelection();
          setStatus(`${selection.width} x ${selection.height} の範囲を複製しました。`);
        }
        return true;
      }

      function getPlacementTileValue() {
        if (state.activeLayer !== "ground" && !state.selectedTile) return undefined;
        return state.activeLayer === "ground"
          ? createTileEntry(state.selectedTile)
          : createTileEntry(state.selectedTile) || null;
      }

      function fillRange(startCell, endCell) {
        const rect = getRectFromCells(startCell, endCell);
        const layer = getLayer();
        const fillValue = getPlacementTileValue();
        if (!rect || !layer || fillValue === undefined) return;

        const snapshot = createHistorySnapshot();
        let changed = false;
        for (let y = rect.minY; y <= rect.maxY; y += 1) {
          for (let x = rect.minX; x <= rect.maxX; x += 1) {
            const index = y * state.map.width + x;
            if (!tileEntriesEqual(layer.tiles[index], fillValue)) {
              layer.tiles[index] = copyTileEntry(fillValue);
              changed = true;
            }
          }
        }
        if (!changed) return;
        renderSurface();
        commitHistoryEntry(snapshot);
        setStatus(`${rect.width} x ${rect.height} の範囲を塗りました。`);
      }

      function drawTileImage(tileId, x, y, layerIndex) {
        const placedTileId = getTileIdFromEntry(tileId);
        const rotation = getTileRotationFromEntry(tileId);
        const def = getTileDef(placedTileId);
        if (!def) return;
        const tileSize = state.map.tileSize;
        const img = document.createElement("img");
        img.className = "map-image";
        img.src = resolveEditorImagePath(def.image || "");
        img.alt = def.name || placedTileId;
        img.title = `${def.name || placedTileId} (${placedTileId})`;
        img.style.left = `${x * tileSize + (def.drawOffsetX || 0)}px`;
        img.style.top = `${y * tileSize + (def.drawOffsetY || 0)}px`;
        img.style.width = `${def.drawWidth || tileSize}px`;
        img.style.height = `${def.drawHeight || tileSize}px`;
        img.style.zIndex = String(10 + layerIndex * 1000 + y * state.map.width + x);
        if (rotation) {
          img.style.transform = `rotate(${rotation}deg)`;
          img.style.transformOrigin = "center center";
        }
        if (!def.image) {
          img.style.background = "#d7cbb6";
        }
        surface.appendChild(img);
      }

      function renderCoordLabels() {
        grid.innerHTML = "";
        coordLabelButton.classList.toggle("active", state.showCoordLabels);
        if (!state.showCoordLabels) return;

        const tileSize = state.map.tileSize;
        const fontSize = Math.max(8, Math.min(13, Math.floor(tileSize * 0.24)));
        const fragment = document.createDocumentFragment();
        for (let y = 0; y < state.map.height; y += 1) {
          for (let x = 0; x < state.map.width; x += 1) {
            const label = document.createElement("span");
            label.className = "coord-label";
            label.textContent = getTileCoordLabel(x, y);
            label.style.left = `${x * tileSize + 4}px`;
            label.style.top = `${y * tileSize + 3}px`;
            label.style.fontSize = `${fontSize}px`;
            fragment.appendChild(label);
          }
        }
        grid.appendChild(fragment);
      }

      function renderSurface() {
        const tileSize = state.map.tileSize;
        surface.style.width = `${state.map.width * tileSize}px`;
        surface.style.height = `${state.map.height * tileSize}px`;
        grid.style.backgroundSize = `${tileSize}px ${tileSize}px`;
        renderCoordLabels();

        [...surface.querySelectorAll(".map-image")].forEach((node) => node.remove());

        state.map.layers.forEach((layer, layerIndex) => {
          layer.tiles.forEach((tileEntry, index) => {
            if (!getTileIdFromEntry(tileEntry)) return;
            const x = index % state.map.width;
            const y = Math.floor(index / state.map.width);
            drawTileImage(tileEntry, x, y, layerIndex);
          });
        });

        cursorCell.style.width = `${tileSize}px`;
        cursorCell.style.height = `${tileSize}px`;
        mapTitle.textContent = state.map.name;
        applyMapZoom();
        updateExport();
      }

      function renderLayerTabs() {
        layerTabs.innerHTML = "";
        layerConfigs.forEach((config) => {
          const button = document.createElement("button");
          button.textContent = config.name;
          button.classList.toggle("active", state.activeLayer === config.id);
          button.addEventListener("click", () => {
            state.activeLayer = config.id;
            const choices = getPaletteTiles();
            if (!choices.includes(state.selectedTile)) state.selectedTile = choices[0] || "";
            renderLayerTabs();
            renderPalette();
            renderSelectedInfo();
          });
          layerTabs.appendChild(button);
        });
      }

      function renderPalette() {
        palette.innerHTML = "";
        const choices = getPaletteTiles();
        choices.forEach((tileId) => {
          const def = defs[tileId];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tile-pick";
          button.classList.toggle("active", state.selectedTile === tileId);
          button.title = `${def.name || tileId} (${tileId})`;

          if (def.image) {
            const img = document.createElement("img");
            img.src = resolveEditorImagePath(def.image);
            img.alt = def.name || tileId;
            const scale = 48 / (def.drawWidth || state.map.tileSize || 48);
            img.style.width = `${(def.drawWidth || 48) * scale}px`;
            img.style.height = `${(def.drawHeight || 48) * scale}px`;
            img.style.left = `${(def.drawOffsetX || 0) * scale}px`;
            img.style.top = `${(def.drawOffsetY || 0) * scale}px`;
            button.appendChild(img);
          }

          const label = document.createElement("span");
          label.textContent = def.name || tileId;
          button.appendChild(label);
          button.addEventListener("click", () => {
            state.selectedTile = tileId;
            renderPalette();
            renderSelectedInfo();
          });
          palette.appendChild(button);
        });
      }

      function renderSelectedInfo() {
        const def = getTileDef(state.selectedTile);
        selectedInfo.innerHTML = "";
        const name = document.createElement("div");
        name.innerHTML = def ? `<strong>${def.name || state.selectedTile}</strong>` : "<strong>未選択</strong>";
        const id = document.createElement("div");
        id.textContent = def ? state.selectedTile : "-";
        const layer = document.createElement("div");
        layer.textContent = `layer: ${state.activeLayer}`;
        const rotation = document.createElement("div");
        rotation.textContent = `rotate: ${state.selectedRotation}deg`;
        const pass = document.createElement("div");
        pass.textContent = def ? `passable: ${def.passable ? "true" : "false"}` : "passable: -";
        selectedInfo.append(name, id, layer, rotation, pass);
      }

      function appendTilePreview(parent, tileEntry, boxSize, options = {}) {
        const tileId = getTileIdFromEntry(tileEntry);
        const def = getTileDef(tileId);
        if (!def) return false;

        if (def.image) {
          const img = document.createElement("img");
          img.src = resolveEditorImagePath(def.image);
          img.alt = def.name || tileId;
          const sourceTileSize = options.sourceTileSize || state.map.tileSize || boxSize;
          const scale = boxSize / sourceTileSize;
          img.style.width = `${(def.drawWidth || sourceTileSize) * scale}px`;
          img.style.height = `${(def.drawHeight || sourceTileSize) * scale}px`;
          img.style.left = `${(def.drawOffsetX || 0) * scale}px`;
          img.style.top = `${(def.drawOffsetY || 0) * scale}px`;
          if (Number.isFinite(options.zIndex)) {
            img.style.zIndex = String(options.zIndex);
          }
          const rotation = getTileRotationFromEntry(tileEntry);
          if (rotation) {
            img.style.transform = `rotate(${rotation}deg)`;
            img.style.transformOrigin = "center center";
          }
          parent.appendChild(img);
        } else {
          parent.style.background = def.passable === false ? "#777" : "#8bbd62";
        }
        return true;
      }

      function renderMarginTileControl() {
        marginTileCell.innerHTML = "";
        marginTileCell.style.background = "#d8decf";
        const marginTiles = state.map ? getMarginTiles() : {};
        const entries = layerConfigs
          .map((config, index) => ({
            config,
            index,
            tileEntry: marginTiles[config.id],
            tileId: getTileIdFromEntry(marginTiles[config.id]),
          }))
          .filter((entry) => entry.tileId);

        marginTileCell.classList.toggle("empty", entries.length === 0);
        marginTileCell.title = entries.length
          ? `余白タイル: ${entries.map((entry) => {
              const def = getTileDef(entry.tileId);
              return `${entry.config.name} ${def && def.name ? def.name : entry.tileId} (${entry.tileId})`;
            }).join(" / ")}`
          : "余白タイルなし";

        const previewSize = Math.max(1, marginTileCell.clientWidth || 42);
        entries.forEach((entry) => {
          appendTilePreview(marginTileCell, entry.tileEntry, previewSize, {
            sourceTileSize: state.map.tileSize,
            zIndex: 10 + entry.index * 100,
          });
        });
      }

      function toggleCoordLabels() {
        state.showCoordLabels = !state.showCoordLabels;
        renderCoordLabels();
        setStatus(state.showCoordLabels ? "座標番号を表示しました。" : "座標番号を非表示にしました。");
      }

      function renderMapSelect() {
        mapSelect.innerHTML = "";
        const newOption = document.createElement("option");
        newOption.value = "__new";
        newOption.textContent = "新規 8x15";
        mapSelect.appendChild(newOption);
        Object.values(sourceMaps).forEach((map) => {
          const option = document.createElement("option");
          option.value = map.id;
          option.textContent = map.name || map.id;
          mapSelect.appendChild(option);
        });
      }

      function renderDefaultTiles() {
        defaultTileSelect.innerHTML = "";
        Object.keys(defs)
          .filter((tileId) => tileFitsLayer(tileId, "ground"))
          .forEach((tileId) => {
            const option = document.createElement("option");
            option.value = tileId;
            option.textContent = defs[tileId].name || tileId;
            defaultTileSelect.appendChild(option);
          });
      }

      function syncInputsFromMap() {
        mapIdInput.value = state.map.id;
        mapNameInput.value = state.map.name;
        mapWidthInput.value = state.map.width;
        mapHeightInput.value = state.map.height;
        tileSizeInput.value = state.map.tileSize;
        defaultTileSelect.value = state.map.defaultTile;
      }

      function setStatus(text) {
        statusLine.textContent = text;
      }

      function updateEditorMode() {
        if (!state.map) {
          editorMode.textContent = "";
          return;
        }

        const isSourceMap = !!sourceMaps[state.map.id];
        editorMode.textContent = isSourceMap
          ? "現在の表示: maps.js にある既存マップを編集中です。反映には JS書き出し後の差し替えが必要です。"
          : "現在の表示: ブラウザ上の新規マップです。まだ maps.js には登録されていません。";
      }

      function paintCell(cell) {
        if (!cell) return;
        const key = `${cell.index}:${state.activeLayer}:${state.tool}:${state.selectedTile}:${state.selectedRotation}`;
        if (state.lastPaintKey === key && state.tool !== "fill") return;
        state.lastPaintKey = key;

        const layer = getLayer();
        if (!layer) return;
        if (state.tool === "paint") {
          if (state.activeLayer !== "ground" && !state.selectedTile) return;
          const nextTile = createTileEntry(state.selectedTile);
          if (tileEntriesEqual(layer.tiles[cell.index], nextTile)) return;
          beginPendingHistoryEntry();
          layer.tiles[cell.index] = nextTile;
        } else if (state.tool === "erase") {
          const nextTile = state.activeLayer === "ground" ? state.map.defaultTile : null;
          if (tileEntriesEqual(layer.tiles[cell.index], nextTile)) return;
          beginPendingHistoryEntry();
          layer.tiles[cell.index] = nextTile;
        } else if (state.tool === "fill") {
          const fillValue = state.activeLayer === "ground"
            ? createTileEntry(state.selectedTile)
            : createTileEntry(state.selectedTile) || null;
          if (layer.tiles.every((tile) => tileEntriesEqual(tile, fillValue))) return;
          beginPendingHistoryEntry();
          layer.tiles = layer.tiles.map(() => fillValue);
        }
        renderSurface();
      }

      function setMarginTileFromSelection() {
        if (!state.map) return;
        const marginTiles = getMarginTiles();
        if (state.tool === "erase") {
          const nextTile = getMarginFillForLayer(state.activeLayer, state.map.defaultTile);
          if (tileEntriesEqual(marginTiles[state.activeLayer], nextTile)) return;
          const snapshot = createHistorySnapshot();
          marginTiles[state.activeLayer] = nextTile;
          renderMarginTileControl();
          updateExport();
          commitHistoryEntry(snapshot);
          setStatus(`余白タイルの ${state.activeLayer} レイヤーを消しました。`);
          return;
        }
        if (!state.selectedTile) {
          setStatus("余白タイルに置くタイルを選択してください。");
          return;
        }
        const nextTile = createTileEntry(state.selectedTile);
        if (tileEntriesEqual(marginTiles[state.activeLayer], nextTile)) return;
        const snapshot = createHistorySnapshot();
        marginTiles[state.activeLayer] = nextTile;
        renderMarginTileControl();
        updateExport();
        commitHistoryEntry(snapshot);
        const def = getTileDef(state.selectedTile);
        setStatus(`余白タイルの ${state.activeLayer} レイヤーを ${def && def.name ? def.name : state.selectedTile} にしました。`);
      }

      function resizeMapFromInputs() {
        const width = Math.max(1, Math.min(80, Number(mapWidthInput.value) || state.map.width));
        const height = Math.max(1, Math.min(80, Number(mapHeightInput.value) || state.map.height));
        const tileSize = Math.max(16, Math.min(96, Number(tileSizeInput.value) || 48));
        const defaultTile = defaultTileSelect.value || "grass";
        const oldWidth = Math.max(1, Number(state.map.width) || width);
        const oldHeight = Math.max(1, Number(state.map.height) || height);
        const snapshot = createHistorySnapshot();

        state.map.id = sanitizeId(mapIdInput.value);
        state.map.name = mapNameInput.value || state.map.id;
        state.map.tileSize = tileSize;
        state.map.width = width;
        state.map.height = height;
        state.map.defaultTile = defaultTile;
        state.map.layers = state.map.layers.map((layer) => {
          const fill = layer.id === "ground" ? defaultTile : null;
          return resizeLayerPreservingPositions(layer, oldWidth, oldHeight, width, height, fill);
        });
        clearDuplicateSelection();
        syncInputsFromMap();
        renderAll();
        commitHistoryEntry(snapshot);
        setStatus("マップ設定を反映しました。");
      }

      function formatTileRows(tiles, width) {
        const rows = [];
        for (let y = 0; y < tiles.length / width; y += 1) {
          const row = tiles.slice(y * width, y * width + width)
            .map((tile) => formatTileSource(tile))
            .join(", ");
          rows.push(`            ${row},`);
        }
        return rows.join("\n");
      }

      function formatMarginTilesSource(marginTiles) {
        const source = marginTiles || {};
        const rows = layerConfigs.map((config) => `        ${config.id}: ${formatTileSource(source[config.id])},`);
        return `{
${rows.join("\n")}
      }`;
      }

      function rotateSelection(delta) {
        state.selectedRotation = normalizeRotation(state.selectedRotation + delta);
        renderSelectedInfo();
        setStatus(`向きを ${state.selectedRotation}度 にしました。`);
      }

      function buildMapSource() {
        const safeId = sanitizeId(state.map.id);
        const layers = state.map.layers.map((layer) => `        {
          id: "${layer.id}",
          name: "${layer.name}",
          tiles: [
${formatTileRows(layer.tiles, state.map.width)}
          ],
        }`).join(",\n");

        return `    ${safeId}: {
      id: "${safeId}",
      name: "${state.map.name}",
      tileSize: ${state.map.tileSize},
      width: ${state.map.width},
      height: ${state.map.height},
      defaultTile: "${state.map.defaultTile}",
      marginTiles: ${formatMarginTilesSource(getMarginTiles())},
      layers: [
${layers}
      ],
      events: ${JSON.stringify(state.map.events || [], null, 8).replace(/\n/g, "\n      ")},
    },`;
      }

      function createSerializableMap(map) {
        return {
          id: sanitizeId(map.id),
          name: map.name || sanitizeId(map.id),
          tileSize: Number(map.tileSize) || 48,
          width: Number(map.width) || 8,
          height: Number(map.height) || 15,
          defaultTile: map.defaultTile || "grass",
          marginTiles: Object.fromEntries(layerConfigs.map((config) => [
            config.id,
            createSerializableTileEntry((map.marginTiles || {})[config.id]),
          ])),
          layers: (map.layers || []).map((layer) => ({
            id: layer.id,
            name: layer.name || layer.id,
            tiles: (layer.tiles || []).map(createSerializableTileEntry),
          })),
          events: Array.isArray(map.events) ? clone(map.events) : [],
        };
      }

      function createHistorySnapshot() {
        return state.map ? createSerializableMap(state.map) : null;
      }

      function snapshotsEqual(a, b) {
        return JSON.stringify(a) === JSON.stringify(b);
      }

      function updateHistoryButtons() {
        undoButton.disabled = state.undoStack.length === 0;
        redoButton.disabled = state.redoStack.length === 0;
        undoButton.title = `一つ戻る (${state.undoStack.length}/${HISTORY_LIMIT})`;
        redoButton.title = `一つ進む (${state.redoStack.length}/${HISTORY_LIMIT})`;
      }

      function trimHistoryStack(stack) {
        while (stack.length > HISTORY_LIMIT) stack.shift();
      }

      function resetHistory() {
        state.undoStack = [];
        state.redoStack = [];
        state.pendingHistorySnapshot = null;
        updateHistoryButtons();
      }

      function commitHistoryEntry(snapshot) {
        if (!snapshot || !state.map) {
          updateHistoryButtons();
          return false;
        }
        const current = createHistorySnapshot();
        if (snapshotsEqual(snapshot, current)) {
          updateHistoryButtons();
          return false;
        }
        state.undoStack.push(snapshot);
        trimHistoryStack(state.undoStack);
        state.redoStack = [];
        updateHistoryButtons();
        return true;
      }

      function beginPendingHistoryEntry() {
        if (!state.pendingHistorySnapshot) {
          state.pendingHistorySnapshot = createHistorySnapshot();
        }
      }

      function finishPendingHistoryEntry() {
        const snapshot = state.pendingHistorySnapshot;
        state.pendingHistorySnapshot = null;
        return commitHistoryEntry(snapshot);
      }

      function restoreHistorySnapshot(snapshot) {
        if (!snapshot) return;
        state.pendingHistorySnapshot = null;
        state.map = normalizeMap(snapshot);
        mapSelect.value = sourceMaps[state.map.id] ? state.map.id : "__new";
        const choices = getPaletteTiles();
        if (!choices.includes(state.selectedTile)) state.selectedTile = choices[0] || "";
        syncInputsFromMap();
        renderAll();
      }

      function undoMapEdit() {
        finishPendingHistoryEntry();
        if (!state.undoStack.length) return;
        const current = createHistorySnapshot();
        const previous = state.undoStack.pop();
        if (current) {
          state.redoStack.push(current);
          trimHistoryStack(state.redoStack);
        }
        restoreHistorySnapshot(previous);
        updateHistoryButtons();
        setStatus("一つ戻しました。");
      }

      function redoMapEdit() {
        finishPendingHistoryEntry();
        if (!state.redoStack.length) return;
        const current = createHistorySnapshot();
        const next = state.redoStack.pop();
        if (current) {
          state.undoStack.push(current);
          trimHistoryStack(state.undoStack);
        }
        restoreHistorySnapshot(next);
        updateHistoryButtons();
        setStatus("一つ進めました。");
      }

      function createRecordPayload(map) {
        return {
          type: "healer-map-editor-record",
          version: 1,
          savedAt: new Date().toISOString(),
          map: createSerializableMap(map),
        };
      }

      function downloadDraftFile(serializableMap) {
        const blob = new Blob([JSON.stringify(serializableMap, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${sanitizeId(serializableMap.id)}.draft.json`;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function downloadRecordFile(record) {
        const savedAt = String(record.savedAt || "").replace(/[:.]/g, "-");
        const fileName = `${sanitizeId(record.map.id)}_${savedAt || "record"}.record.json`;
        const blob = new Blob([JSON.stringify(record, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = fileName;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function parseRecordPayload(raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.type === "healer-map-editor-record" && parsed.map) {
          return parsed.map;
        }
        return parsed;
      }

      function updateExport() {
        exportText.value = buildMapSource();
      }

      function renderAll() {
        clearRangePreview();
        clearDuplicateSelection();
        renderLayerTabs();
        renderPalette();
        renderSelectedInfo();
        renderMarginTileControl();
        renderSurface();
        updateEditorMode();
        updateHistoryButtons();
      }

      function loadMapById(mapId) {
        if (mapId === "__new") {
          state.map = createNewMap();
          mapSelect.value = "__new";
        } else {
          state.map = normalizeMap(sourceMaps[mapId]);
          mapSelect.value = mapId;
        }
        const choices = getPaletteTiles();
        if (!choices.includes(state.selectedTile)) state.selectedTile = choices[0] || "";
        syncInputsFromMap();
        resetHistory();
        renderAll();
        setStatus(mapId === "__new" ? "新規編集マップを開きました。" : `${state.map.name} を読み込みました。`);
      }

      function saveRecord() {
        try {
          const record = createRecordPayload(state.map);
          downloadRecordFile(record);
          setStatus("作業記録JSONを保存しました。");
        } catch (error) {
          console.error(error);
          setStatus("作業記録の保存に失敗しました。");
        }
      }

      function saveLocal() {
        const serializableMap = createSerializableMap(state.map);
        try {
          localStorage.setItem("healerMapEditorDraft", JSON.stringify(serializableMap));
          setStatus("ブラウザ内に一時保存しました。");
        } catch (error) {
          console.error(error);
          downloadDraftFile(serializableMap);
          setStatus("ブラウザ保存が使えなかったため、JSONファイルとして保存しました。");
        }
      }

      function loadRecord() {
        draftFileInput.click();
      }

      function reloadCurrentMapFromSource() {
        if (!state.map || !state.map.id || !sourceMaps[state.map.id]) {
          setStatus("このマップは maps.js 内に見つかりません。");
          return;
        }
        const ok = window.confirm("編集中の内容を破棄して、maps.js にある同名マップを読み込み直します。よろしいですか？");
        if (!ok) {
          setStatus("現在マップの戻しをキャンセルしました。");
          return;
        }
        loadMapById(state.map.id);
      }

      function reloadTileMapsPage() {
        const ok = window.confirm("maps.js を再読込します。未保存の編集内容は失われる可能性があります。必要なら先に作業記録保存をしてください。続けますか？");
        if (!ok) {
          setStatus("maps再読込をキャンセルしました。");
          return;
        }
        window.location.reload();
      }

      function deleteCurrentMap() {
        if (!state.map) return;
        const mapName = state.map.name || state.map.id || "このマップ";
        const ok = window.confirm(`${mapName} を削除します。編集中の内容は消えます。よろしいですか？`);
        if (!ok) {
          setStatus("マップ削除をキャンセルしました。");
          return;
        }

        try {
          const raw = localStorage.getItem("healerMapEditorDraft");
          if (raw) {
            const draft = JSON.parse(raw);
            if (draft && sanitizeId(draft.id) === sanitizeId(state.map.id)) {
              localStorage.removeItem("healerMapEditorDraft");
            }
          }
        } catch (error) {
          console.error(error);
        }

        state.map = createNewMap();
        mapSelect.value = "__new";
        syncInputsFromMap();
        resetHistory();
        renderAll();
        setStatus(`${mapName} を削除して、新規マップへ戻しました。`);
      }

      function loadLocal() {
        try {
          const raw = localStorage.getItem("healerMapEditorDraft");
          if (!raw) {
            draftFileInput.click();
            return;
          }
          state.map = normalizeMap(JSON.parse(raw));
          syncInputsFromMap();
          resetHistory();
          renderAll();
          setStatus("一時保存を読み込みました。");
        } catch (error) {
          console.error(error);
          draftFileInput.click();
          setStatus("ブラウザ保存を読めなかったため、JSONファイルを選択してください。");
        }
      }

      async function copyExport() {
        updateExport();
        try {
          await navigator.clipboard.writeText(exportText.value);
          setStatus("コピーしました。");
        } catch (error) {
          exportText.focus();
          exportText.select();
          setStatus("テキストを選択しました。");
        }
      }

      function downloadExport() {
        updateExport();
        const blob = new Blob([exportText.value], { type: "text/javascript;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${sanitizeId(state.map.id)}.map.js`;
        anchor.click();
        URL.revokeObjectURL(url);
        setStatus("JS定義を書き出しました。maps.js へ反映してください。");
      }

      function clearActiveLayer() {
        const layer = getLayer();
        if (!layer) return;
        const fill = layer.id === "ground" ? state.map.defaultTile : null;
        if (layer.tiles.every((tile) => tileEntriesEqual(tile, fill))) return;
        const snapshot = createHistorySnapshot();
        layer.tiles = layer.tiles.map(() => fill);
        renderSurface();
        commitHistoryEntry(snapshot);
        setStatus(`${layer.name} を消去しました。`);
      }

      function initEvents() {
        draftFileInput.addEventListener("change", async () => {
          const [file] = draftFileInput.files || [];
          if (!file) {
            setStatus("読込をキャンセルしました。");
            return;
          }
          try {
            const raw = await file.text();
            state.map = normalizeMap(parseRecordPayload(raw));
            syncInputsFromMap();
            resetHistory();
            renderAll();
            setStatus(`${file.name} を読み込みました。`);
          } catch (error) {
            console.error(error);
            setStatus("JSON読込に失敗しました。ファイル内容を確認してください。");
          } finally {
            draftFileInput.value = "";
          }
        });

        mapSelect.addEventListener("change", () => loadMapById(mapSelect.value));
        document.getElementById("new-map-button").addEventListener("click", () => {
          state.map = createNewMap();
          mapSelect.value = "__new";
          syncInputsFromMap();
          resetHistory();
          renderAll();
          setStatus("新規マップを作成しました。まだ maps.js には保存されていません。");
        });
        document.getElementById("resize-button").addEventListener("click", resizeMapFromInputs);
        document.querySelectorAll("[data-tool]").forEach((button) => {
          button.addEventListener("click", () => {
            finishPendingHistoryEntry();
            state.tool = button.dataset.tool;
            state.isPointerDown = false;
            stopDragAutoScroll();
            state.lastPaintKey = "";
            clearRangePreview();
            clearDuplicateSelection();
            document.querySelectorAll("[data-tool]").forEach((node) => node.classList.toggle("active", node === button));
          });
        });
        document.getElementById("rotate-left-button").addEventListener("click", () => rotateSelection(-90));
        document.getElementById("rotate-right-button").addEventListener("click", () => rotateSelection(90));
        document.getElementById("rotate-reset-button").addEventListener("click", () => {
          state.selectedRotation = 0;
          renderSelectedInfo();
          setStatus("向きを 0度 にしました。");
        });
        coordLabelButton.addEventListener("click", toggleCoordLabels);
        marginTileCell.addEventListener("click", setMarginTileFromSelection);
        undoButton.addEventListener("click", undoMapEdit);
        redoButton.addEventListener("click", redoMapEdit);
        zoomOutButton.addEventListener("click", () => setMapZoom((state.mapZoom || 1) - MAP_ZOOM_STEP));
        zoomInButton.addEventListener("click", () => setMapZoom((state.mapZoom || 1) + MAP_ZOOM_STEP));
        zoomResetButton.addEventListener("click", () => setMapZoom(1));
        zoomRange.addEventListener("input", () => setMapZoom(Number(zoomRange.value) / 100));
        window.addEventListener("resize", () => applyMapZoom());
        surface.addEventListener("contextmenu", (event) => {
          if (state.tool === "duplicate") event.preventDefault();
        });

        surface.addEventListener("pointerdown", (event) => {
          const cell = getCellFromEvent(event);
          if (!cell) return;
          if (state.tool === "duplicate") {
            event.preventDefault();
            if (state.duplicateSelection) {
              pasteDuplicateSelection(cell, event.button === 2);
              return;
            }
            if (event.button !== 0) return;
            state.isPointerDown = true;
            state.lastPaintKey = "";
            state.duplicateStartCell = cell;
            state.duplicateCurrentCell = cell;
            surface.setPointerCapture(event.pointerId);
            startDragAutoScroll(event);
            renderRangePreview(cell, cell);
            return;
          }
          state.isPointerDown = true;
          state.lastPaintKey = "";
          surface.setPointerCapture(event.pointerId);
          startDragAutoScroll(event);
          if (state.tool === "range") {
            state.rangeStartCell = cell;
            state.rangeCurrentCell = cell;
            renderRangePreview(cell, cell);
            return;
          }
          paintCell(cell);
        });
        surface.addEventListener("pointermove", (event) => {
          if (state.isPointerDown) {
            rememberDragPointer(event);
            if (canAutoScrollDrag()) scheduleDragAutoScroll();
          }
          updateSurfacePointerFromClient(event.clientX, event.clientY);
        });
        surface.addEventListener("pointerup", (event) => {
          stopDragAutoScroll();
          if (state.tool === "duplicate") {
            if (state.isPointerDown && state.duplicateStartCell && !state.duplicateSelection) {
              const cell = getCellFromEvent(event) || state.duplicateCurrentCell;
              if (captureDuplicateSelection(state.duplicateStartCell, cell)) {
                state.duplicateHoverCell = cell;
                renderDuplicateFrame(cell);
              }
            }
            state.isPointerDown = false;
            state.lastPaintKey = "";
            return;
          }
          if (state.tool === "range" && state.rangeStartCell) {
            fillRange(state.rangeStartCell, getCellFromEvent(event) || state.rangeCurrentCell);
          }
          state.isPointerDown = false;
          state.lastPaintKey = "";
          finishPendingHistoryEntry();
          clearRangePreview();
        });
        surface.addEventListener("pointerleave", () => {
          cursorCell.classList.add("hidden");
          if (state.isPointerDown && (state.tool === "paint" || state.tool === "erase")) return;
          if (state.tool === "duplicate") {
            if (state.isPointerDown && state.duplicateStartCell && !state.duplicateSelection) return;
            state.duplicateHoverCell = null;
            renderDuplicateFrame(null);
            return;
          }
          if (state.isPointerDown && state.tool === "range") return;
          state.isPointerDown = false;
          stopDragAutoScroll();
          state.lastPaintKey = "";
          finishPendingHistoryEntry();
          clearRangePreview();
        });
        surface.addEventListener("pointercancel", () => {
          state.isPointerDown = false;
          stopDragAutoScroll();
          state.lastPaintKey = "";
          finishPendingHistoryEntry();
          clearRangePreview();
          if (state.tool === "duplicate" && !state.duplicateSelection) {
            clearDuplicateSelection();
          }
        });

        document.getElementById("save-record-button").addEventListener("click", saveRecord);
        document.getElementById("load-record-button").addEventListener("click", loadRecord);
        document.getElementById("save-local-button").addEventListener("click", saveLocal);
        document.getElementById("load-local-button").addEventListener("click", loadLocal);
        document.getElementById("reload-map-button").addEventListener("click", reloadCurrentMapFromSource);
        document.getElementById("reload-page-button").addEventListener("click", reloadTileMapsPage);
        document.getElementById("delete-map-button").addEventListener("click", deleteCurrentMap);
        document.getElementById("copy-button").addEventListener("click", copyExport);
        document.getElementById("download-button").addEventListener("click", downloadExport);
        document.getElementById("clear-layer-button").addEventListener("click", clearActiveLayer);
      }

      function init() {
        renderDefaultTiles();
        renderMapSelect();
        initEvents();
        loadMapById("__new");
      }

      init();
    </script>
  </body>
</html>
